<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- 使用你的图片作为图标 -->
    <link rel="icon" href="/20260507070833_18ad1ca2b8041321c117.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- 改标题 -->
    <title>Flowai Studio</title>
    
    <meta name="keywords" content="Flowai Studio, AI聊天, DeepSeek, Claude, Gemini, 文生图">
    <meta name="description" content="Flowai Studio - 强大的AI对话与创作平台，支持DeepSeek R1 + Claude + Gemini组合模型及文生图功能。">
    <meta name="theme-color" content="#000000">
    <meta itemprop="image" content="/20260507070833_18ad1ca2b8041321c117.webp">
    <link rel="manifest" href="/site.webmanifest">
    
    <script src="/workbox.js" defer></script>
    <style>
        html, body, #root {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        #index-loading {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        @media (prefers-color-scheme: dark) {
            html[data-theme="system"] #index-loading {
                background-color: #000;
            }
        }
        html[data-theme="dark"] #index-loading {
            background-color: #000;
        }
        .loading-icon {
            width: 48px;
            height: 48px;
            background-image: url('/20260507070833_18ad1ca2b8041321c117.webp');
            background-size: contain;
            background-repeat: no-repeat;
        }
        @media (min-width: 768px) {
            .loading-icon {
                width: 80px;
                height: 80px;
            }
        }
        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .loading-bar::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 40%;
            background: #eee;
            animation: loading 1.5s infinite ease-in-out;
            border-radius: 2px;
        }
        @keyframes loading {
            0% { left: -40%; }
            100% { left: 100%; }
        }
    </style>
    <script>
        const theme = localStorage.getItem('theme') || 'system';
        document.documentElement.setAttribute('data-theme', theme);
    </script>
  </head>
  <body>
    <div id="root">
      <div id="index-loading">
        <div class="loading-icon"></div>
        <div class="loading-bar"></div>
      </div>
    </div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
